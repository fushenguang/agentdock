# ci-fast.yml — Fast quality gates on every pull request
#
# Jobs run IN PARALLEL for fast feedback (typically < 3 min total).
# Intentionally excludes secretlint and align:check:
#   - secretlint runs in ci-full.yml (post-merge to main)
#   - align:check runs in align-check.yml (separate workflow, not duplicated here)
#
# See: openspec/changes/add-layer2-constraint-gates/specs/ci-gates/spec.md

name: CI Fast

on:
  pull_request:
    branches:
      - main
      - "release/**"

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm check-types

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  arch-guard:
    name: Architecture Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run architecture check
        run: pnpm arch:check
