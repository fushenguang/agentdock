# Lefthook — Git hooks configuration
# https://lefthook.dev/configuration/
#
# To activate hooks, run: pnpm lefthook install
# This is auto-run after `pnpm install` via the `prepare` script.

pre-commit:
  # Run checks in parallel for fast feedback (align-fast + lint-staged together
  # keeps total pre-commit time well under 15 seconds on typical machines).
  parallel: true
  commands:
    # Fast subset only — orphan-change (invariant 1) + WIP limit (invariant 3)
    # Runs in seconds; full alignment check runs in CI.
    align-fast:
      run: pnpm align:check --fast

    # ESLint on staged .ts/.tsx files only — fast, only lints what changed.
    # Catches architecture rule violations (no-direct-db-in-features, ban-ts-comment)
    # before they reach CI.
    lint-staged:
      glob: "**/*.{ts,tsx}"
      run: pnpm exec eslint {staged_files}

    # Optional local type-check gate.
    # Enable with: LEFTHOOK_RUN_TYPECHECK=1 git commit ...
    type-check:
      run: '[ "${LEFTHOOK_RUN_TYPECHECK:-0}" = "1" ] && pnpm check-types || echo "type-check: skipped (set LEFTHOOK_RUN_TYPECHECK=1 to enable)"'
